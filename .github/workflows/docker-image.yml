name: Docker Image CI
on:
  push:
    branches:
      - main
    tags:
      - '*.*.*'
jobs:
  build:
    name: Push Docker image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Docker meta backend image
        id: meta-back
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/unxwares/taiga-back
          flavor: |
            suffix=-oidc
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{raw}}
            type=ref,event=pr
      - name: Docker meta frontend image
        id: meta-front
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/unxwares/taiga-front
          flavor: |
            suffix=-oidc
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{raw}}
            type=ref,event=pr
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          file: Dockerfile.back
          push: true
          tags: ${{ steps.meta-back.outputs.tags }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          file: Dockerfile.front
          push: true
          tags: ${{ steps.meta-front.outputs.tags }}
